<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Security headers (supplement with real HTTP headers in nginx/server config) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none';" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- SEO -->
    <title>UnityFund — Financial Operating Platform for Member-Based Organizations</title>
    <meta name="description" content="UnityFund automates fund collection, payment reconciliation, and payouts for Nigerian cooperatives, welfare associations, alumni groups, and professional bodies. Powered by Nomba." />
    <meta name="keywords" content="cooperative management, fund management Nigeria, welfare association software, Ajo software, alumni dues collection, Nomba payments" />
    <link rel="canonical" href="https://unityfund.io" />

    <!-- Open Graph -->
    <meta property="og:title" content="UnityFund — Manage Your Organization's Funds" />
    <meta property="og:description" content="Replace spreadsheets and WhatsApp with automated fund management. Built for Nigerian cooperatives, welfare associations, and professional bodies." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://unityfund.io" />
    <meta property="og:image" content="https://unityfund.io/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="UnityFund — Financial Operating Platform" />
    <meta name="twitter:description" content="Automate fund collection, reconciliation, and payouts for member-based organizations." />
    <meta name="twitter:image" content="https://unityfund.io/og-image.svg" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "UnityFund",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web",
      "description": "Financial operating platform for member-based organizations in Nigeria",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "NGN"
      },
      "creator": {
        "@type": "Organization",
        "name": "Team Zero Downtime"
      }
    }
    </script>

    <!-- Inter font — preconnect first, then load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Skip link is hidden immediately — does not wait for Tailwind bundle to load -->
    <style>
      #skip-link {
        position: absolute;
        width: 1px; height: 1px;
        padding: 0; margin: -1px;
        overflow: hidden;
        clip: rect(0,0,0,0);
        white-space: nowrap;
        border: 0;
      }
      #skip-link:focus {
        position: fixed;
        top: 1rem; left: 1rem;
        width: auto; height: auto;
        padding: 0.5rem 1rem;
        overflow: visible;
        clip: auto;
        white-space: normal;
        z-index: 9999;
        background: #fff;
        color: #0c1232;
        font-weight: 600;
        font-size: 0.875rem;
        border-radius: 0.375rem;
        box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        outline: 2px solid #4f46e5;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <a id="skip-link" href="#main-content">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
