<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0c1232"/>

  <!-- Subtle radial glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#0c1232" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo mark (centered, scaled up) -->
  <circle cx="556" cy="270" r="72" fill="#4f46e5"/>
  <circle cx="644" cy="270" r="72" fill="#1a2b6e"/>
  <circle cx="600" cy="270" r="44" fill="#818cf8"/>

  <!-- Brand name -->
  <text x="600" y="390" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-2">UnityFund</text>

  <!-- Tagline -->
  <text x="600" y="448" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="400" fill="#94a3b8" text-anchor="middle">Financial Operating Platform for Member-Based Organizations</text>

  <!-- Badge -->
  <rect x="476" y="498" width="248" height="44" rx="22" fill="#4f46e5" fill-opacity="0.2" stroke="#4f46e5" stroke-opacity="0.4" stroke-width="1"/>
  <text x="600" y="526" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#818cf8" text-anchor="middle">Powered by Nomba</text>
</svg>
